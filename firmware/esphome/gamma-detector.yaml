external_components:
  - source:
      type: local
      path: external_components
    components: [gdk101]

esphome:
  name: radiation
  friendly_name: radiation
  on_boot:
    priority: -100
    then:
      - delay: 3s

esp32:
  board: esp32-c3-devkitm-1
  framework:
    type: arduino

logger:
  level: DEBUG

api:
  encryption:
    key: !secret api_key

ota:
  platform: esphome
  password: !secret ota_password

wifi:
  use_address: radiation.geier.solutions
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2

  ap:
    ssid: !secret wifi_ap_ssid
    password: !secret wifi_ap_password

i2c:
  sda: GPIO8
  scl: GPIO9
  scan: true
  frequency: 50kHz

gdk101:
  address: 0x18
  update_interval: 60s

sensor:
  - platform: gdk101
    radiation_dose_per_1m:
      name: "GDK101 Radiation Dose (1 min)"
    radiation_dose_per_10m:
      name: "GDK101 Radiation Dose (10 min)"
    status:
      name: "GDK101 Status"
    measurement_duration:
      name: "GDK101 Measuring Time"

binary_sensor:
  - platform: gdk101
    vibrations:
      name: "GDK101 Vibrations"

text_sensor:
  - platform: gdk101
    version:
      name: "GDK101 FW Version"

captive_portal: